    <button class="openbtn" onclick="openNav()">☰</button>
    <main class="catalog-page">
      <header class="main page-header catalog-header">
        <div class="headspacer"></div>
        <h1>Catalog</h1>
        <p>Find plant sizing & pricing by name & category.</p>
      </header>
      <button id="wishlist-submit-button" class="wishlist-heart">
        <i class="fas fa-heart"></i><span id="wishlist-count-display">0</span>
      </button>
      <button id="clear-wishlist" class="wishlist-clear-btn">
        <i class="fas fa-times"></i>
      </button>
      <div class="search-wrapper">
        <input
          type="search"
          id="data-search"
          name="search"
          placeholder="Type to search"
          autocomplete="off"
        />
        <select
          id="category-filter"
          aria-label="Filter catalog by category"
          autocomplete="off"
        >
          <option value="all">All Categories</option>
          <option value="Spruce">Spruce</option>
          <option value="Fir">Fir</option>
          <option value="Pine">Pine</option>
          <option value="Shrubs">Shrubs</option>
          <option value="Small Trees">Small Trees</option>
          <option value="Large Trees">Large Trees</option>
          <option value="Bigger Stuff">Bigger Stuff</option>
        </select>
      </div>
      <div class="user-cards" data-user-cards-container></div>
    </main>
    <template data-user-template>
      <div class="card">
        <div class="header" data-header></div>
        <div class="body" data-body></div>
        <div class="summary" data-summary></div>
      </div>
      <div class="card-expanded">
        <div class="header" data-header></div>
        <div class="body" data-body></div>
        <div class="summary" data-summary></div>
        <div class="summary" data-size></div>
        <div class="summary" data-age></div>
        <div class="summary" data-class></div>
        <div class="summary" data-prices></div>
      </div>
    </template>

    <br />
    <br />
